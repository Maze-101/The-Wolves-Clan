<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>عشيرة الذئاب</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&family=Lalezar&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <!-- PackSignature SVG -->
        <svg
          class="pack-signature"
          viewBox="0 0 400 100"
          xmlns="http://www.w3.org/2000/svg"
          role="presentation"
          aria-hidden="true"
        >
          <path
            d="M 20 80 Q 200 10 380 80"
            fill="none"
            stroke="var(--moonsilver)"
            stroke-opacity="0.45"
            stroke-width="1.5"
          />
          <circle cx="20" cy="80" r="3.5" fill="var(--moonsilver)" />
          <circle cx="65" cy="64.7" r="3.5" fill="var(--moonsilver)" />
          <circle cx="110" cy="53.8" r="3.5" fill="var(--moonsilver)" />
          <circle cx="155" cy="47.2" r="3.5" fill="var(--moonsilver)" />
          <circle cx="200" cy="45" r="5" fill="var(--ember)" />
          <circle cx="245" cy="47.2" r="3.5" fill="var(--moonsilver)" />
          <circle cx="290" cy="53.8" r="3.5" fill="var(--moonsilver)" />
          <circle cx="335" cy="64.7" r="3.5" fill="var(--moonsilver)" />
          <circle cx="380" cy="80" r="3.5" fill="var(--moonsilver)" />
        </svg>

        <p class="hero-eyebrow">NINE OF US</p>
        <h1 class="hero-title">دفاع الملك سلمان</h1>
        <p class="hero-subtitle">
          عايزين نتجوز
        </p>
      </header>

      <section class="members-section" id="members">
        <div class="section-heading">
          <p class="section-eyebrow">THE ROSTER</p>
          <h2 class="section-title">خريجين شبرا القومية</h2>
        </div>

        <div class="members-grid" id="members-grid">
          <!-- Members will be injected here by script.js -->
        </div>
      </section>

      <section class="group-section" id="group">
        <div class="group-photo-frame">
          <img
            class="group-photo"
            src="./images/group-photo.png"
            alt="The whole pack together"
            loading="lazy"
          />
        </div>

        <p class="group-caption" lang="ar" dir="rtl">
          عشيرة الذئاب
        </p>
      </section>

      <footer class="site-footer">
        <p>Built by the Mazengar.</p>
      </footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
